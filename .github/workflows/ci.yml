name: CI Pipeline - RecargaYa

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Tests unitarios, integracion y BDD
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configurar Python 3.12
        run: uv python install 3.12

      - name: Instalar dependencias del proyecto
        run: uv sync

      - name: Ejecutar tests unitarios y de integracion con cobertura
        run: uv run pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Ejecutar escenarios BDD con behave
        run: uv run behave features/recarga.feature

  performance:
    name: Prueba de rendimiento con Locust
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configurar Python 3.12
        run: uv python install 3.12

      - name: Instalar dependencias del proyecto
        run: uv sync

      - name: Iniciar servidor API en background
        run: uv run uvicorn app.api:app --host 0.0.0.0 --port 8000 &
        shell: bash

      - name: Esperar a que el servidor este listo
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:8000/health && break || sleep 2
          done
        shell: bash

      - name: Ejecutar prueba de rendimiento Locust
        run: |
          uv run locust -f locustfile.py \
            --host=http://localhost:8000 \
            --users 30 \
            --spawn-rate 5 \
            --run-time 60s \
            --headless \
            --html=reporte_locust.html \
            --csv=reporte_locust
        shell: bash

      - name: Verificar P95 menor a 300ms
        run: |
          python - <<'EOF'
          import csv

          with open("reporte_locust_stats.csv") as f:
              reader = csv.DictReader(f)
              for row in reader:
                  if row["Name"] == "Aggregated":
                      p95 = float(row["95%"])
                      print(f"P95 encontrado: {p95}ms")
                      assert p95 < 300, f"FALLO: P95 = {p95}ms >= 300ms"
                      print("OK: P95 < 300ms")
          EOF
        shell: bash

      - name: Subir reporte HTML de Locust
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-locust
          path: reporte_locust.html
